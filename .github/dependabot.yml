version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
    open-pull-requests-limit: 3
    groups:
      python-runtime:
        patterns:
          - "fastapi"
          - "uvicorn"
          - "pydantic*"
          - "sqlalchemy"
          - "psycopg*"
          - "alembic"
      rag-stack:
        patterns:
          - "langchain*"
          - "sentence-transformers"
          - "qdrant-client"
          - "openai"
      quality-tools:
        patterns:
          - "pytest"
          - "ruff"
          - "httpx"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 2
    groups:
      backend-images:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
    open-pull-requests-limit: 2
    groups:
      frontend-images:
        patterns:
          - "*"
